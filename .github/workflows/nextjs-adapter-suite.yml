name: Next.js Adapter Suite

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: nextjs-adapter-suite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-adapter-suite:
    strategy:
      fail-fast: false
      matrix:
        test_group:
          - 1/20
          - 2/20
          - 3/20
          - 4/20
          - 5/20
          - 6/20
          - 7/20
          - 8/20
          - 9/20
          - 10/20
          - 11/20
          - 12/20
          - 13/20
          - 14/20
          - 15/20
          - 16/20
          - 17/20
          - 18/20
          - 19/20
          - 20/20
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout adapter repo
        uses: actions/checkout@v4

      - name: Checkout Next.js
        uses: actions/checkout@v4
        with:
          repository: vercel/next.js
          ref: v16.2.2
          path: next.js-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Install adapter dependencies
        run: npm install

      - name: Prepare Next.js checkout
        env:
          CI: "1"
        run: |
          NEXTJS_DIR="$GITHUB_WORKSPACE/next.js-src" \
          npm run test:nextjs:local:prepare

      - name: Run official deploy adapter suite
        env:
          NEXTJS_DIR: ${{ github.workspace }}/next.js-src
          NEXT_TEST_GROUP: ${{ matrix.test_group }}
        run: npm run test:nextjs:local
