name: Next.js Adapter Suite

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: nextjs-adapter-suite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-adapter-suite:
    strategy:
      fail-fast: false
      matrix:
        test_group:
          - 1/32
          - 2/32
          - 3/32
          - 4/32
          - 5/32
          - 6/32
          - 7/32
          - 8/32
          - 9/32
          - 10/32
          - 11/32
          - 12/32
          - 13/32
          - 14/32
          - 15/32
          - 16/32
          - 17/32
          - 18/32
          - 19/32
          - 20/32
          - 21/32
          - 22/32
          - 23/32
          - 24/32
          - 25/32
          - 26/32
          - 27/32
          - 28/32
          - 29/32
          - 30/32
          - 31/32
          - 32/32
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout adapter repo
        uses: actions/checkout@v4

      - name: Checkout Next.js
        uses: actions/checkout@v4
        with:
          repository: vercel/next.js
          ref: v16.2.2
          path: next.js-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Install adapter dependencies
        run: npm install

      - name: Prepare Next.js checkout
        env:
          CI: "1"
        run: |
          NEXTJS_DIR="$GITHUB_WORKSPACE/next.js-src" \
          npm run test:nextjs:local:prepare

      - name: Run official deploy adapter suite
        env:
          NEXTJS_DIR: ${{ github.workspace }}/next.js-src
          NEXT_TEST_GROUP: ${{ matrix.test_group }}
        run: npm run test:nextjs:local
